name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  bazel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      # Vivado targets are tagged "manual", so //... excludes them here.
      - name: Build all targets
        run: bazelisk build //...

      - name: Test all targets
        run: bazelisk test //...

      - name: Verilator lint RTL
        run: bazelisk build --config=verilator_lint //rtl/...
